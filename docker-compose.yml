version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_ENDPOINT=https://models.github.ai/inference
      - OPENAI_DEPLOYMENT=gpt-4o
      - OPENAI_EMBEDDINGS_DEPLOYMENT=text-embedding-3-small
      - OPENAI_KEY=${OPENAI_KEY}
      - PLAID_CLIENT_ID=sandbox
      - PLAID_SECRET=sandbox
      - PLAID_ENV=sandbox
    volumes:
      - ./chroma_db:/app/chroma_db
    networks:
      - loan-network

  # React Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - loan-network

networks:
  loan-network:
    driver: bridge

volumes:
  chroma_db:
